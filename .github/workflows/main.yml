name: Build Plugin  
  
on:  
  push:  
    branches: [ main, develop ]  
  pull_request:  
    branches: [ main ]  
  workflow_dispatch:  # 添加手动运行按钮  
  
jobs:  
  build:  
    runs-on: ubuntu-latest  
      
    steps:  
    - name: Checkout code  
      uses: actions/checkout@v4  
        
    - name: Set up JDK 21  
      uses: actions/setup-java@v4  
      with:  
        java-version: '21'  
        distribution: 'temurin'  
        cache: maven  
          
    - name: Build project  
      run: mvn clean package -B  
        
    - name: Upload plugin JAR  
      uses: actions/upload-artifact@v4  
      with:  
        name: CraftEngineConverter  
        path: Plugin/target/CraftEngineConverter-*.jar  
        retention-days: 30
